name: Compile CV

on:
  push:
    paths:
      - 'CV.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: CV.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CV.pdf
          git diff --cached --quiet || git commit -m "Auto-compile CV.pdf from CV.tex"
          git push
